name: Build aligned with openHAB tags

on:
  schedule:
    - cron: '0 3 * * 0'  # Sonntag 3 Uhr (nach openHAB weekly release)
  workflow_dispatch:

jobs:
  fetch-tags:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.get-tags.outputs.tags }}
    steps:
      - name: Fetch openHAB debian tags
        id: get-tags
        run: |
          # openHAB Docker Hub images mit "debian" im Tag
          TAGS=$(curl -s 'https://registry.hub.docker.com/v2/repositories/openhab/openhab/tags?page_size=100' \
            | jq -r '.results[] | select(.name | contains("debian")) | .name' \
            | sort -V | tail -10 | jq -R . | jq -s .)

          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "Found tags: $TAGS"

  build:
    needs: fetch-tags
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tag: ${{ fromJson(needs.fetch-tags.outputs.tags) }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            BASE_IMAGE=openhab/openhab:${{ matrix.tag }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/openhab-docker-graalpy-venv:${{ matrix.tag }}
            ghcr.io/${{ github.repository_owner }}/openhab-docker-graalpy-venv:latest
